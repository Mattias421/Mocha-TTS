# https://lightning.ai/docs/pytorch/stable/api/lightning.pytorch.callbacks.ModelCheckpoint.html

best_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${paths.output_dir}/checkpoints # directory to save the model file
  filename: best # checkpoint filename
  monitor: loss/val # name of the logged metric which determines when model is improving
  verbose: False # verbosity mode
  save_last: false # last.ckpt handled by periodic callback below
  save_top_k: 1 # keep one best model by validation loss
  mode: "min" # lower validation loss is better
  auto_insert_metric_name: False # keep filename exactly "best.ckpt"
  save_weights_only: False # if True, then only the model’s weights will be saved
  every_n_train_steps: null # number of training steps between checkpoints
  train_time_interval: null # checkpoints are monitored at the specified time interval
  every_n_epochs: 1 # evaluate each validation epoch for best checkpoint
  save_on_train_epoch_end: null # whether to run checkpointing at the end of the training epoch or the end of validation

latest_checkpoints:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${paths.output_dir}/checkpoints # directory to save the model file
  filename: checkpoint_{epoch:03d} # checkpoint filename
  monitor: epoch # rolling latest checkpoints by epoch index
  verbose: False # verbosity mode
  save_last: true # additionally always save an exact copy of the last checkpoint to a file last.ckpt
  save_top_k: 10 # keep latest 10 periodic checkpoints
  mode: "max" # later epoch is better for rolling latest list
  auto_insert_metric_name: True # include monitor name in filename metadata
  save_weights_only: False # if True, then only the model’s weights will be saved
  every_n_train_steps: null # number of training steps between checkpoints
  train_time_interval: null # checkpoints are monitored at the specified time interval
  every_n_epochs: 25 # number of epochs between periodic checkpoints
  save_on_train_epoch_end: null # whether to run checkpointing at the end of the training epoch or the end of validation
